# force cron refresh
# activate cron
# trigger cron update
name: Ultra Flip Bot Cron

on:
  schedule:
    - cron: "*/* * * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        run: python Ultraflipbot.py
